name: skyclad-bun

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie
    container_name: skyclad-bun-postgres
    environment:
      POSTGRES_DB: skyclad-bun
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - skyclad-bun_postgres_data:/var/lib/postgresql
      - ./init/001-create-vector.sql:/docker-entrypoint-initdb.d/001-create-vector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  skyclad-bun_postgres_data:
